      properties: {item_template: Startseite.RowTemplate1}
      type: RepeatingPanel
    layout_properties: {grid_position: 'DPENJR,FHSAKZ'}
    name: data_grid_1
    properties:
      columns:
      - {data_key: arzt, expand: false, id: JKSDUP, title: Arzt, width: 87}
      - {data_key: pflegekraft, id: VJQQOR, title: Pflegekraft}
      - {data_key: patient, id: OJLQEN, title: Patient}
      - {data_key: behandlung, id: GCOVXX, title: Behandlung}
      - {data_key: medikament, expand: false, id: XYEIGU, title: Medikament, width: 111.5}
      - {data_key: dosierung, id: UNDZVY, title: Dosierung}
      visible: false
    type: DataGrid
  - event_bindings: {}
    layout_properties: {grid_position: 'KFVAKG,DSOWIG'}
    name: InformationenMedikament
    properties: {text: Informationen Medikamente}
    type: Button
  - event_bindings: {}
    layout_properties: {grid_position: 'FCAHSF,FTHXBT'}
    name: zurueck
    properties: {text: Zurück}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {col_widths: '{}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- layout_properties: {slot: title}
  name: label_1
  properties: {text: Krankenhaus - Datenbank}
  type: Label
container:
  properties: {html: '@theme:standard-page.html'}
  type: HtmlTemplate
is_package: true
